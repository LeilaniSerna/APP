<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <title>AssistiveArm App</title>
  <base href="/" />
  <meta name="viewport" content="viewport-fit=cover, width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <link rel="icon" type="image/png" href="assets/icon/favicon.png" />
  
  <!-- Librerías Externas del Prototipo -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <script>
      tailwind.config = {
          theme: {
              extend: {
                  fontFamily: {
                      sans: ['Inter', 'Plus Jakarta Sans', 'sans-serif'],
                  },
                  colors: {
                      appBg: '#121212',
                      cardBg: '#2c2e33',
                      cardBgDark: '#232529',
                      accentWine: '#a83250',
                      accentBlue: '#4b8bf4',
                      textMuted: '#9ca3af',
                      brandDeep: '#572640',
                      brandLight: '#733456',
                      bgDark: '#212126',
                      bgCard: '#3B4245',
                      textLight: '#F2F2F2',
                      borderBrand: 'rgba(115, 52, 86, 0.25)',
                  }
              }
          }
      }
  </script>
  <style>
      body { font-family: 'Inter', 'Plus Jakarta Sans', sans-serif; background-color: #121212; color: white; }
      .arm-joint { transition: transform 1.2s cubic-bezier(0.4, 0, 0.2, 1); }
      .no-scrollbar::-webkit-scrollbar { display: none; }
      @keyframes face-scan { 0% { top: 0%; opacity: 0.8; } 50% { top: 100%; opacity: 0.8; } 100% { top: 0%; opacity: 0.8; } }
      .scan-line { animation: face-scan 2.5s infinite linear; }
      .tab-btn.active { color: #a83250; border-bottom: 2px solid #a83250; }
  </style>
</head>
<body class="bg-appBg">
  <app-root></app-root>
</body>
</html>
