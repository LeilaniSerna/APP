<ion-content [fullscreen]="true" style="--background: url('/assets/img/login-background.png') no-repeat center center / cover;">
  
  <!-- Contenedor general centrado -->
  <div class="min-h-screen w-full flex items-center justify-center p-4 bg-black/20 backdrop-blur-[2px]">
    
    <!-- Tarjeta Principal idéntica a la imagen -->
    <div class="bg-[#212326]/75 backdrop-blur-md border border-white/20 w-full max-w-[340px] rounded-[38px] p-7 shadow-2xl relative overflow-hidden flex flex-col justify-between space-y-6">
        
        <!-- Header: Círculo blanco + Títulos -->
        <div class="text-center relative z-10 space-y-1.5 flex flex-col items-center">
            <!-- Círculo blanco totalmente limpio -->
            <div class="w-24 h-24 bg-white rounded-full shadow-lg mb-3"></div>
            
            <h1 class="text-xl font-bold text-white tracking-tight">Brazo Inteligente</h1>
            <p class="text-xs text-gray-300 font-extralight tracking-wide">Sistema Inteligente Clínico</p>
        </div>

        <!-- Vista de Escaneo Facial -->
        <div *ngIf="isScanning" class="relative w-44 h-44 mx-auto border-2 border-brandLight/40 rounded-3xl overflow-hidden bg-bgDark/80 flex items-center justify-center my-2">
            <div class="absolute inset-x-0 h-0.5 bg-brandLight shadow-[0_0_12px_#733456] scan-line"></div>
            <div class="text-center space-y-1 relative z-10">
                <span class="text-4xl block animate-pulse">📷</span>
                <span class="text-[10px] uppercase tracking-wider text-brandLight font-bold">Analizando Rostro...</span>
            </div>
        </div>

        <!-- Formulario (Inputs gris redondeados) -->
        <div *ngIf="!isScanning" class="space-y-4 relative z-10">
            <div class="space-y-1.5">
                <label class="text-sm text-white font-bold ml-1 block">Usuario</label>
                <input 
                  type="email" 
                  [(ngModel)]="email" 
                  class="w-full bg-[#919396] text-gray-900 border border-black/20 rounded-full px-5 py-3 text-sm outline-none focus:ring-2 focus:ring-white/50 transition-all shadow-inner">
            </div>
            
            <div class="space-y-1.5">
                <label class="text-sm text-white font-bold ml-1 block">Contraseña</label>
                <input 
                  type="password" 
                  [(ngModel)]="password" 
                  class="w-full bg-[#919396] text-gray-900 border border-black/20 rounded-full px-5 py-3 text-sm outline-none focus:ring-2 focus:ring-white/50 transition-all shadow-inner">
            </div>
        </div>

        <!-- Botones inferiores (Oscuros y redondeados) -->
        <div class="relative z-10 pt-1">
            <div *ngIf="!isScanning" class="grid grid-cols-2 gap-3">
                <button 
                  (click)="handleTraditionalLogin()" 
                  class="w-full bg-[#0d0d0e] hover:bg-black active:scale-95 text-gray-200 text-xs font-light py-3.5 px-2 rounded-full transition-all text-center">
                    Iniciar Sesión 
                </button>
                
                <button 
                  (click)="handleBiometricLogin()" 
                  class="w-full bg-[#0d0d0e] hover:bg-black active:scale-95 text-gray-200 text-xs font-light py-3.5 px-2 rounded-full transition-all text-center">
                    Escaneo Facial
                </button>
            </div>

            <!-- Botón alternativo durante escaneo -->
            <button 
              *ngIf="isScanning" 
              (click)="handleBiometricLogin()" 
              [disabled]="true" 
              class="w-full bg-[#0d0d0e]/80 text-brandLight text-xs font-bold py-3.5 rounded-full">
                ESCANEANDO ROSTRO...
            </button>
        </div>

    </div>
  </div>
</ion-content>
