<ion-header class="ion-no-border">
  <ion-toolbar style="--background: transparent;" class="px-2 pt-2">
    <div class="flex justify-between items-center bg-[#212326]/80 backdrop-blur-md border border-white/10 rounded-2xl px-3 py-2 shadow-lg">
      <ion-buttons slot="start">
        <ion-back-button defaultHref="/home" text="Volver" class="text-gray-300 text-xs font-semibold"></ion-back-button>
      </ion-buttons>
      <ion-title class="text-xs font-bold tracking-widest uppercase text-white p-0 text-center">
        AJUSTES Y PERFIL
      </ion-title>
      <div class="w-12"></div> <!-- Espaciador para centrar el título -->
    </div>
  </ion-toolbar>
</ion-header>

<ion-content style="--background: url('/assets/img/login-background.png') no-repeat center center / cover;">
  <main class="max-w-md w-full mx-auto p-4 space-y-5 pt-2 pb-24">
    
    <!-- Encabezado de la Página -->
    <div class="flex items-center justify-between bg-[#212326]/60 backdrop-blur-md border border-white/10 p-4 rounded-[24px]">
      <div>
        <h1 class="text-base font-bold tracking-tight text-white">Ajustes y Perfil</h1>
        <p class="text-[11px] text-gray-400 font-light">Gestión de usuario y dispositivo</p>
      </div>
      <span class="text-[10px] bg-white/10 border border-white/20 text-white px-3 py-1 rounded-full font-bold tracking-wider">
        A-ARM v1.0
      </span>
    </div>

    <!-- Mensaje de confirmación de guardado -->
    <div *ngIf="saveSuccess" class="bg-emerald-500/20 backdrop-blur-md border border-emerald-500/40 text-emerald-300 p-3.5 rounded-[20px] text-xs flex items-center gap-2 shadow-lg animate-fade-in">
      <ion-icon name="checkmark-circle-outline" class="text-lg text-emerald-400"></ion-icon>
      <span class="font-medium">¡Perfil y ajustes guardados correctamente!</span>
    </div>

    <!-- Tarjeta 1: Perfil de Usuario con Foto -->
    <div class="bg-[#212326]/75 backdrop-blur-md border border-white/20 p-5 rounded-[30px] shadow-xl space-y-5">
      <h2 class="text-[11px] font-bold text-gray-400 uppercase tracking-wider flex items-center gap-2">
        <ion-icon name="person-outline" class="text-white text-sm"></ion-icon>
        Perfil de Usuario
      </h2>

      <!-- Selección de Foto de Perfil -->
      <div class="flex flex-col items-center justify-center space-y-2.5">
        <div class="relative group">
          <div class="w-24 h-24 rounded-full border-2 border-white/30 overflow-hidden bg-black/40 flex items-center justify-center shadow-2xl">
            <img *ngIf="avatarUrl" [src]="avatarUrl" alt="Foto de perfil" class="w-full h-full object-cover">
            <ion-icon *ngIf="!avatarUrl" name="person-outline" class="text-4xl text-gray-500"></ion-icon>
          </div>

          <!-- Botón flotante para subir foto -->
          <label class="absolute bottom-0 right-0 bg-white text-gray-900 p-2.5 rounded-full cursor-pointer shadow-xl hover:scale-105 active:scale-95 transition-transform flex items-center justify-center">
            <ion-icon name="camera-outline" class="text-sm text-gray-900"></ion-icon>
            <input type="file" accept="image/*" class="hidden" (change)="onFileSelected($event)">
          </label>
        </div>
        <p class="text-[10px] text-gray-400 text-center font-light">Toca la cámara para cambiar foto</p>
      </div>

      <!-- Campos de texto del perfil -->
      <div class="space-y-3">
        <div class="space-y-1">
          <label class="text-[10px] text-gray-300 font-semibold ml-1 uppercase tracking-wider">Nombre Completo</label>
          <input 
            type="text" 
            [(ngModel)]="nombre" 
            class="w-full bg-[#919396] text-gray-900 placeholder-gray-600 rounded-full px-4 py-2.5 text-xs outline-none focus:ring-2 focus:ring-white/50 transition">
        </div>

        <div class="space-y-1">
          <label class="text-[10px] text-gray-400 font-semibold ml-1 uppercase tracking-wider">Correo Electrónico</label>
          <input 
            type="email" 
            [value]="email" 
            disabled 
            class="w-full bg-black/30 border border-white/10 rounded-full px-4 py-2.5 text-xs text-gray-400 cursor-not-allowed">
        </div>

        <div class="space-y-1">
          <label class="text-[10px] text-gray-300 font-semibold ml-1 uppercase tracking-wider">Especialidad / Cargo</label>
          <input 
            type="text" 
            [(ngModel)]="especialidad" 
            placeholder="Ej. Cirujano Robótico" 
            class="w-full bg-[#919396] text-gray-900 placeholder-gray-600 rounded-full px-4 py-2.5 text-xs outline-none focus:ring-2 focus:ring-white/50 transition">
        </div>
      </div>
    </div>

    <!-- Tarjeta 2: Contacto de Emergencia -->
    <div class="bg-[#212326]/75 backdrop-blur-md border border-white/20 p-5 rounded-[30px] shadow-xl space-y-4">
      <h2 class="text-[11px] font-bold text-gray-400 uppercase tracking-wider flex items-center gap-2">
        <ion-icon name="call-outline" class="text-rose-400 text-sm"></ion-icon>
        Contacto de Emergencia
      </h2>

      <div class="space-y-3">
        <div class="space-y-1">
          <label class="text-[10px] text-gray-300 font-semibold ml-1 uppercase tracking-wider">Nombre del Contacto</label>
          <input 
            type="text" 
            [(ngModel)]="contactoNombre" 
            placeholder="Ej. Dra. María González" 
            class="w-full bg-[#919396] text-gray-900 placeholder-gray-600 rounded-full px-4 py-2.5 text-xs outline-none focus:ring-2 focus:ring-white/50 transition">
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
          <div class="space-y-1">
            <label class="text-[10px] text-gray-300 font-semibold ml-1 uppercase tracking-wider">Teléfono</label>
            <input 
              type="tel" 
              [(ngModel)]="contactoTelefono" 
              placeholder="Ej. +52 55 1234 5678" 
              class="w-full bg-[#919396] text-gray-900 placeholder-gray-600 rounded-full px-4 py-2.5 text-xs outline-none focus:ring-2 focus:ring-white/50 transition">
          </div>

          <div class="space-y-1">
            <label class="text-[10px] text-gray-300 font-semibold ml-1 uppercase tracking-wider">Parentesco / Rol</label>
            <input 
              type="text" 
              [(ngModel)]="contactoRelacion" 
              placeholder="Ej. Médico de Guardia" 
              class="w-full bg-[#919396] text-gray-900 placeholder-gray-600 rounded-full px-4 py-2.5 text-xs outline-none focus:ring-2 focus:ring-white/50 transition">
          </div>
        </div>
      </div>
    </div>

    <!-- Tarjeta 3: Configuración del Dispositivo Brazo -->
    <div class="bg-[#212326]/75 backdrop-blur-md border border-white/20 p-5 rounded-[30px] shadow-xl space-y-4">
      <h2 class="text-[11px] font-bold text-gray-400 uppercase tracking-wider flex items-center gap-2">
        <ion-icon name="hardware-chip-outline" class="text-white text-sm"></ion-icon>
        Ajustes del Brazo (12V DC)
      </h2>

      <div class="space-y-3 bg-black/20 p-4 rounded-[20px] border border-white/5">
        <div class="flex justify-between items-center text-xs font-semibold text-gray-200">
          <span class="opacity-80 text-[11px]">Presión de Agarre</span>
          <span class="text-white font-mono font-bold bg-white/10 border border-white/20 px-3 py-1 rounded-full text-[11px]">
            {{ forceLabel }}
          </span>
        </div>
        <input 
          type="range" 
          min="15" 
          max="100" 
          [(ngModel)]="forceValue" 
          class="custom-range w-full h-2 bg-black/50 rounded-lg appearance-none cursor-pointer">
      </div>
    </div>

    <!-- Acciones: Guardar Cambios y Cerrar Sesión -->
    <div class="space-y-3 pt-2">
      <button 
        (click)="guardarPerfil()" 
        class="w-full bg-white hover:bg-gray-200 active:scale-95 text-gray-900 text-xs font-bold py-3.5 rounded-full shadow-xl transition flex items-center justify-center gap-2">
        <ion-icon name="save-outline" class="text-base"></ion-icon>
        GUARDAR CAMBIOS
      </button>

      <button 
        (click)="handleLogout()" 
        class="w-full bg-[#0d0d0e]/80 hover:bg-black active:scale-95 text-rose-400 border border-rose-500/30 text-xs font-bold py-3.5 rounded-full transition flex items-center justify-center gap-2 shadow-lg">
        <ion-icon name="log-out-outline" class="text-base"></ion-icon>
        CERRAR SESIÓN DEL PORTAL MÉDICO
      </button>
    </div>

  </main>
</ion-content>
